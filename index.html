<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Priyanka ❤️</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="style.css">
</head>

<body class="text-white flex items-center justify-center min-h-screen">

<div id="main" class="card p-8 text-center w-[350px] relative">

<img src="https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif"
class="w-32 h-32 mx-auto rounded-full border-4 border-pink-300 mb-4">

<h1 class="love-font text-3xl text-pink-200 mb-2">Hey Priyanka ❤️</h1>

<p class="text-sm mb-4">I’ve been wanting to ask you something...</p>

<p class="text-lg mb-6">Priyanka, will you be mine? 🥺👉👈</p>

<div class="flex justify-center gap-6 mt-6">
  <button id="yes-button" class="bg-green-500 px-6 py-2 rounded-lg">
    YES ❤️
  </button>
</div>

<button id="no-button" class="bg-red-500 px-6 py-2 rounded-lg fixed">
  No 😭
</button>

</div>

<div id="success" class="hidden text-center">
<h1 class="love-font text-5xl text-pink-200">YAYYY Priyanka 💖</h1>
<p class="mt-4 text-xl">I knew you’d say yes ❤️</p>
</div>

<div id="hearts-container"></div>

<script src="script.js"></script>
</body>
</html>
